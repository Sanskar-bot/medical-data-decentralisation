services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medvault_net

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - .:/app
    working_dir: /app/server
    command: gunicorn --bind 0.0.0.0:5000 server:app --workers 3 --timeout 60
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medvault_net

  patient_portal:
    build: .
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      SERVER_BASE: http://backend:5000
      LANDING_URL: http://landing:5003
    volumes:
      - .:/app
    working_dir: /app/portals
    command: gunicorn --bind 0.0.0.0:5001 patient_portal:app --workers 2 --timeout 60
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medvault_net

  doctor_portal:
    build: .
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env
    environment:
      SERVER_BASE: http://backend:5000
      LANDING_URL: http://landing:5003
    volumes:
      - .:/app
    working_dir: /app/portals
    command: gunicorn --bind 0.0.0.0:5002 doctor_portal:app --workers 2 --timeout 60
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medvault_net

  landing:
    build: .
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      doctor_portal:
        condition: service_healthy
    env_file: .env
    environment:
      SERVER_BASE: http://backend:5000
      DOCTOR_PORTAL_URL: http://doctor_portal:5002
    volumes:
      - .:/app
    working_dir: /app/portals
    command: gunicorn --bind 0.0.0.0:5003 landing:app --workers 2 --timeout 60
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medvault_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      landing:
        condition: service_healthy
      patient_portal:
        condition: service_healthy
      doctor_portal:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - medvault_net

volumes:
  pgdata:

networks:
  medvault_net:
    driver: bridge
