{% extends 'base.html' %}
{% block title %}Prescriptions{% endblock %}
{% block topbar_title %}Prescriptions{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-text">
    <span class="page-eyebrow">Doctor Portal</span>
    <h1 class="type-h1">Prescriptions</h1>
    <p class="type-label" style="color:var(--tx3); margin-top:var(--sp-1);">Create and manage patient prescriptions.</p>
  </div>
</div>

<div id="page-alert" style="display:none; margin-bottom:var(--sp-5);"></div>

<!-- Add Prescription Form -->
<div class="card section">
  <div class="section-header">
    <h2 class="type-h3">New Prescription</h2>
  </div>
  <div class="stack-5">
    <div class="grid-2">
      <div>
        <label class="type-label" for="rx-patient-code">Patient Username or Profile Code</label>
        <input class="input-field" type="text" id="rx-patient-code" placeholder="e.g. john_doe or ABC1234567"
               autocomplete="off" style="margin-top:var(--sp-2);">
        <div id="rx-patient-hint" style="font-size:var(--t-xs); color:var(--tx3); margin-top:var(--sp-1);"></div>
      </div>
      <div>
        <label class="type-label" for="rx-diagnosis">Diagnosis / Reason</label>
        <input class="input-field" type="text" id="rx-diagnosis" placeholder="e.g. Acute pharyngitis"
               style="margin-top:var(--sp-2);">
      </div>
    </div>

    <div>
      <label class="type-label">Medications</label>
      <div id="meds-list" class="stack-3" style="margin-top:var(--sp-2);">
        <div class="med-row grid-3" style="gap:var(--sp-2);">
          <input class="input-field med-name" type="text" placeholder="Medication name" autocomplete="off">
          <input class="input-field med-dose" type="text" placeholder="Dose (e.g. 500mg)">
          <input class="input-field med-freq" type="text" placeholder="Frequency (e.g. TID x 5d)">
        </div>
      </div>
      <button class="btn-ghost" id="add-med-btn" type="button" style="margin-top:var(--sp-3);">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add medication
      </button>
    </div>

    <div>
      <label class="type-label" for="rx-notes">Additional Notes</label>
      <textarea class="input-field" id="rx-notes" rows="2" placeholder="Special instructions, follow-up…"
                style="margin-top:var(--sp-2);"></textarea>
    </div>

    <div id="rx-alert" style="display:none;"></div>
    <button class="btn-primary" id="rx-submit-btn" type="button">
      <span id="rx-btn-text">Create Prescription</span>
      <span id="rx-spinner" class="spinner" style="display:none;"></span>
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var JWT = {{ session.get('jwt_token','') | tojson }};

  function showAlert(el, msg, type) {
    if (!el) return;
    el.className = 'alert alert-' + (type || 'error');
    el.textContent = msg;
    el.style.display = 'flex';
    setTimeout(function() { el.style.display = 'none'; }, 6000);
  }

  // Add medication row
  document.getElementById('add-med-btn').addEventListener('click', function() {
    var row = document.createElement('div');
    row.className = 'med-row grid-3';
    row.style.gap = 'var(--sp-2)';
    row.innerHTML =
      '<input class="input-field med-name" type="text" placeholder="Medication name" autocomplete="off">' +
      '<input class="input-field med-dose" type="text" placeholder="Dose (e.g. 500mg)">' +
      '<input class="input-field med-freq" type="text" placeholder="Frequency (e.g. TID x 5d)">';
    document.getElementById('meds-list').appendChild(row);
  });

  // Resolve patient helper
  function resolvePatient(raw) {
    if (/^[A-Z0-9]{8,12}$/.test(raw.toUpperCase()) && raw.length >= 8) {
      return Promise.resolve(raw.toUpperCase());
    }
    return fetch('/api/resolve_patient', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+JWT},
      body: JSON.stringify({username: raw})
    })
    .then(function(r) { return r.json().then(function(d) { return {ok:r.ok, data:d}; }); })
    .then(function(res) {
      if (!res.ok || !res.data.profile_code) {
        throw new Error(res.data.error || 'Patient not found: ' + raw);
      }
      return res.data.profile_code;
    });
  }

  // Submit prescription
  document.getElementById('rx-submit-btn').addEventListener('click', function() {
    var raw       = (document.getElementById('rx-patient-code').value || '').trim();
    var diagnosis = (document.getElementById('rx-diagnosis').value || '').trim();
    var notes     = (document.getElementById('rx-notes').value || '').trim();
    var alertEl   = document.getElementById('rx-alert');

    if (!raw) { showAlert(alertEl, 'Patient identifier is required.', 'error'); return; }
    if (!diagnosis) { showAlert(alertEl, 'Diagnosis is required.', 'error'); return; }

    // Collect medications
    var meds = [];
    document.querySelectorAll('.med-row').forEach(function(row) {
      var name = (row.querySelector('.med-name').value || '').trim();
      var dose = (row.querySelector('.med-dose').value || '').trim();
      var freq = (row.querySelector('.med-freq').value || '').trim();
      if (name) meds.push({ name: name, dose: dose, frequency: freq });
    });
    if (!meds.length) { showAlert(alertEl, 'Add at least one medication.', 'error'); return; }

    this.disabled = true;
    document.getElementById('rx-btn-text').textContent = 'Resolving patient…';
    document.getElementById('rx-spinner').style.display = 'inline-block';
    var self = this;
    var hintEl = document.getElementById('rx-patient-hint');

    resolvePatient(raw)
    .then(function(code) {
      if (hintEl) hintEl.textContent = 'Patient: ' + code;
      return fetch('/doctor/add_prescription', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+JWT},
        body: JSON.stringify({ patient_code: code, diagnosis: diagnosis, medications: meds, notes: notes })
      }).then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); });
    })
    .then(function(res) {
      self.disabled = false;
      document.getElementById('rx-btn-text').textContent = 'Create Prescription';
      document.getElementById('rx-spinner').style.display = 'none';
      if (res.ok) {
        showAlert(document.getElementById('page-alert'), 'Prescription created successfully.', 'success');
        document.getElementById('rx-patient-code').value = '';
        document.getElementById('rx-diagnosis').value = '';
        document.getElementById('rx-notes').value = '';
        document.querySelectorAll('.med-name').forEach(function(el) { el.value = ''; });
        document.querySelectorAll('.med-dose').forEach(function(el) { el.value = ''; });
        document.querySelectorAll('.med-freq').forEach(function(el) { el.value = ''; });
        if (hintEl) hintEl.textContent = '';
      } else {
        showAlert(alertEl, res.data.error || 'Failed to create prescription.', 'error');
      }
    })
    .catch(function(err) {
      self.disabled = false;
      document.getElementById('rx-btn-text').textContent = 'Create Prescription';
      document.getElementById('rx-spinner').style.display = 'none';
      showAlert(alertEl, err.message || 'Network error.', 'error');
    });
  });
})();
</script>
{% endblock %}
