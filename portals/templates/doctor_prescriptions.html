{% extends 'base.html' %}
{% block title %}Prescriptions{% endblock %}
{% block topbar_title %}Prescriptions{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-text">
    <span class="page-eyebrow">Doctor Portal</span>
    <h1 class="type-h1">Prescriptions</h1>
    <p class="type-label" style="color:var(--tx3); margin-top:var(--sp-1);">Create and manage patient prescriptions.</p>
  </div>
</div>

<div id="page-alert" style="display:none; margin-bottom:var(--sp-5);"></div>

<!-- Add Prescription Form -->
<div class="card section">
  <div class="section-header">
    <h2 class="type-h3">New Prescription</h2>
  </div>
  <div class="stack-5">
    <div class="grid-2">
      <div>
        <label class="type-label" for="rx-patient-code">Patient Username or Profile Code</label>
        <input class="input-field" type="text" id="rx-patient-code" placeholder="e.g. john_doe or ABC1234567"
               autocomplete="off" style="margin-top:var(--sp-2);">
        <div id="rx-patient-hint" style="font-size:var(--t-xs); color:var(--tx3); margin-top:var(--sp-1);"></div>
      </div>
      <div>
        <label class="type-label" for="rx-diagnosis">Diagnosis / Reason</label>
        <input class="input-field" type="text" id="rx-diagnosis" placeholder="e.g. Acute pharyngitis"
               style="margin-top:var(--sp-2);">
      </div>
    </div>

    <div>
      <label class="type-label">Medications</label>
      <div id="meds-list" class="stack-3" style="margin-top:var(--sp-2);">
        <div class="med-row grid-3" style="gap:var(--sp-2);">
          <input class="input-field med-name" type="text" placeholder="Medication name" autocomplete="off">
          <input class="input-field med-dose" type="text" placeholder="Dose (e.g. 500mg)">
          <input class="input-field med-freq" type="text" placeholder="Frequency (e.g. TID x 5d)">
        </div>
      </div>
      <button class="btn-ghost" id="add-med-btn" type="button" style="margin-top:var(--sp-3);">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add medication
      </button>
    </div>

    <div>
      <label class="type-label" for="rx-notes">Additional Notes</label>
      <textarea class="input-field" id="rx-notes" rows="2" placeholder="Special instructions, follow-up…"
                style="margin-top:var(--sp-2);"></textarea>
    </div>

    <!-- Allergy Conflict Panel — shown only on 409 response -->
    <div id="rx-conflict-panel" style="display:none;">
      <div id="rx-conflict-list" class="stack-2"></div>
      <div style="margin-top:var(--sp-4); display:flex; align-items:flex-start; gap:var(--sp-3);">
        <input type="checkbox" id="rx-override-chk"
               style="margin-top:3px; width:16px; height:16px; cursor:pointer; accent-color:var(--r5); flex-shrink:0;">
        <label for="rx-override-chk" style="font-size:var(--t-sm); color:var(--tx2); cursor:pointer; line-height:1.5;">
          I have reviewed this conflict and confirm the prescription should proceed.
        </label>
      </div>
    </div>

    <div id="rx-alert" style="display:none;"></div>
    <button class="btn-primary" id="rx-submit-btn" type="button">
      <span id="rx-btn-text">Create Prescription</span>
      <span id="rx-spinner" class="spinner" style="display:none;"></span>
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var JWT = {{ session.get('jwt_token','') | tojson }};

  // Whether we're currently in "conflict acknowledged" state
  var _pendingConflicts = [];
  var _resolvedPatientCode = null;

  function showAlert(el, msg, type) {
    if (!el) return;
    el.className = 'alert alert-' + (type || 'error');
    el.textContent = msg;
    el.style.display = 'flex';
    setTimeout(function() { el.style.display = 'none'; }, 6000);
  }

  // ── Conflict panel helpers ─────────────────────────────────────────────────

  function showConflictPanel(conflicts) {
    _pendingConflicts = conflicts;
    var panel = document.getElementById('rx-conflict-panel');
    var list  = document.getElementById('rx-conflict-list');
    var chk   = document.getElementById('rx-override-chk');
    chk.checked = false;
    document.getElementById('rx-btn-text').textContent = 'Confirm & Create Prescription';

    list.innerHTML = conflicts.map(function(c) {
      var cls = c.severity === 'high' ? 'alert-danger' : 'alert-warning';
      var sev = c.severity === 'high' ? 'HIGH' : 'MODERATE';
      return '<div class="alert ' + cls + '" style="margin-bottom:0;">' +
        '<strong>' + esc(c.medication) + '</strong>' +
        ' &harr; ' +
        '<strong>' + esc(c.allergy) + '</strong>' +
        ' &nbsp;<span style="font-size:var(--t-xs); opacity:.8;">[' + sev + ']</span>' +
      '</div>';
    }).join('');

    panel.style.display = 'block';
  }

  function clearConflictPanel() {
    _pendingConflicts = [];
    document.getElementById('rx-conflict-panel').style.display = 'none';
    document.getElementById('rx-conflict-list').innerHTML = '';
    document.getElementById('rx-override-chk').checked = false;
    document.getElementById('rx-btn-text').textContent = 'Create Prescription';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Clear conflict panel whenever a medication name is changed
  document.getElementById('meds-list').addEventListener('input', function(e) {
    if (e.target && e.target.classList.contains('med-name') && _pendingConflicts.length) {
      clearConflictPanel();
    }
  });

  // ── Add medication row ─────────────────────────────────────────────────────

  document.getElementById('add-med-btn').addEventListener('click', function() {
    var row = document.createElement('div');
    row.className = 'med-row grid-3';
    row.style.gap = 'var(--sp-2)';
    row.innerHTML =
      '<input class="input-field med-name" type="text" placeholder="Medication name" autocomplete="off">' +
      '<input class="input-field med-dose" type="text" placeholder="Dose (e.g. 500mg)">' +
      '<input class="input-field med-freq" type="text" placeholder="Frequency (e.g. TID x 5d)">';
    document.getElementById('meds-list').appendChild(row);
  });

  // ── Resolve patient helper ─────────────────────────────────────────────────

  function resolvePatient(raw) {
    if (/^[A-Z0-9]{8,12}$/.test(raw.toUpperCase()) && raw.length >= 8) {
      return Promise.resolve(raw.toUpperCase());
    }
    return fetch('/api/resolve_patient', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+JWT},
      body: JSON.stringify({username: raw})
    })
    .then(function(r) { return r.json().then(function(d) { return {ok:r.ok, data:d}; }); })
    .then(function(res) {
      if (!res.ok || !res.data.profile_code) {
        throw new Error(res.data.error || 'Patient not found: ' + raw);
      }
      return res.data.profile_code;
    });
  }

  // ── Submit prescription ────────────────────────────────────────────────────

  function doSubmit(patientCode, override) {
    var diagnosis = (document.getElementById('rx-diagnosis').value || '').trim();
    var notes     = (document.getElementById('rx-notes').value || '').trim();
    var alertEl   = document.getElementById('rx-alert');
    var btn       = document.getElementById('rx-submit-btn');
    var hintEl    = document.getElementById('rx-patient-hint');

    // Collect medications
    var meds = [];
    document.querySelectorAll('.med-row').forEach(function(row) {
      var name = (row.querySelector('.med-name').value || '').trim();
      var dose = (row.querySelector('.med-dose').value || '').trim();
      var freq = (row.querySelector('.med-freq').value || '').trim();
      if (name) meds.push({ name: name, dosage: dose, frequency: freq });
    });

    btn.disabled = true;
    document.getElementById('rx-spinner').style.display = 'inline-block';

    var payload = {
      patient_code: patientCode,
      diagnosis:    diagnosis,
      medications:  meds,
      notes:        notes,
    };
    if (override) {
      payload.override_allergy_check = true;
    }

    fetch('/doctor/add_prescription', {
      method:  'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+JWT},
      body:    JSON.stringify(payload),
    })
    .then(function(r) { return r.json().then(function(d) { return {status: r.status, data: d}; }); })
    .then(function(res) {
      btn.disabled = false;
      document.getElementById('rx-spinner').style.display = 'none';

      if (res.status === 201) {
        // Success
        clearConflictPanel();
        showAlert(document.getElementById('page-alert'), 'Prescription created successfully.', 'success');
        document.getElementById('rx-patient-code').value = '';
        document.getElementById('rx-diagnosis').value = '';
        document.getElementById('rx-notes').value = '';
        document.querySelectorAll('.med-name').forEach(function(el) { el.value = ''; });
        document.querySelectorAll('.med-dose').forEach(function(el) { el.value = ''; });
        document.querySelectorAll('.med-freq').forEach(function(el) { el.value = ''; });
        if (hintEl) hintEl.textContent = '';
        _resolvedPatientCode = null;
        document.getElementById('rx-btn-text').textContent = 'Create Prescription';

      } else if (res.status === 409 && res.data.error === 'allergy_conflict') {
        // Allergy conflict — show inline panel, do NOT auto-dismiss
        showConflictPanel(res.data.conflicts || []);

      } else {
        // Other error — show dismissible alert
        var msg = res.data.detail || res.data.error || 'Failed to create prescription.';
        showAlert(alertEl, msg, 'error');
        document.getElementById('rx-btn-text').textContent = 'Create Prescription';
      }
    })
    .catch(function(err) {
      btn.disabled = false;
      document.getElementById('rx-spinner').style.display = 'none';
      document.getElementById('rx-btn-text').textContent = 'Create Prescription';
      showAlert(document.getElementById('rx-alert'), err.message || 'Network error.', 'error');
    });
  }

  // ── Click handler ──────────────────────────────────────────────────────────

  document.getElementById('rx-submit-btn').addEventListener('click', function() {
    var raw     = (document.getElementById('rx-patient-code').value || '').trim();
    var alertEl = document.getElementById('rx-alert');

    if (!raw) { showAlert(alertEl, 'Patient identifier is required.', 'error'); return; }
    if (!(document.getElementById('rx-diagnosis').value || '').trim()) {
      showAlert(alertEl, 'Diagnosis is required.', 'error'); return;
    }

    var meds = [];
    document.querySelectorAll('.med-row').forEach(function(row) {
      if ((row.querySelector('.med-name').value || '').trim()) meds.push(true);
    });
    if (!meds.length) { showAlert(alertEl, 'Add at least one medication.', 'error'); return; }

    // If we already have conflicts and the doctor is re-submitting via the
    // "Confirm & Create Prescription" button, check override checkbox state.
    if (_pendingConflicts.length) {
      var chk = document.getElementById('rx-override-chk');
      if (!chk.checked) {
        showAlert(alertEl, 'Please check the confirmation box to proceed with the override.', 'error');
        return;
      }
      // Re-use the already-resolved patient code to avoid an extra lookup
      doSubmit(_resolvedPatientCode || raw.toUpperCase(), true);
      return;
    }

    // First submission — resolve patient then submit normally
    document.getElementById('rx-btn-text').textContent = 'Resolving patient…';
    document.getElementById('rx-spinner').style.display = 'inline-block';
    document.getElementById('rx-submit-btn').disabled = true;

    var hintEl = document.getElementById('rx-patient-hint');
    resolvePatient(raw)
    .then(function(code) {
      _resolvedPatientCode = code;
      if (hintEl) hintEl.textContent = 'Patient: ' + code;
      document.getElementById('rx-btn-text').textContent = 'Create Prescription';
      document.getElementById('rx-spinner').style.display = 'none';
      document.getElementById('rx-submit-btn').disabled = false;
      doSubmit(code, false);
    })
    .catch(function(err) {
      document.getElementById('rx-submit-btn').disabled = false;
      document.getElementById('rx-btn-text').textContent = 'Create Prescription';
      document.getElementById('rx-spinner').style.display = 'none';
      showAlert(alertEl, err.message || 'Network error.', 'error');
    });
  });
})();
</script>
{% endblock %}
