worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream doctor_portal_servers {
        server doctor_portal:5002;
    }
    upstream patient_portal_servers {
        server patient_portal:5001;
    }
    upstream landing_servers {
        server landing:5003;
    }

    # Redirect all plain HTTP to HTTPS, on every hostname
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Shared TLS + security header settings, applied per-hostname below
    map $host $upstream_pool {
        default                     landing_servers;
        patient.medvault.local      patient_portal_servers;
        doctor.medvault.local       doctor_portal_servers;
        medvault.local              landing_servers;
    }

    server {
        listen 443 ssl;
        server_name medvault.local patient.medvault.local doctor.medvault.local;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://$upstream_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
